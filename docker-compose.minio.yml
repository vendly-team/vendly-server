# MinIO stack — deployed independently of stage/prod app pipelines.
# Apps connect to MinIO via the shared external network `vendly-net`.
#
# First-time setup on the server:
#   docker network create vendly-net
#   docker compose -f docker-compose.minio.yml --env-file .env up -d
#
# Update / restart:
#   docker compose -f docker-compose.minio.yml --env-file .env pull
#   docker compose -f docker-compose.minio.yml --env-file .env up -d

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: vendly-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_SERVER_URL=https://files.vestor.uz
      - MINIO_BROWSER_REDIRECT_URL=https://files.vestor.uz/console
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - vendly-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  createbuckets:
    image: minio/mc:latest
    container_name: vendly-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - vendly-net
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/prod-vendly &&
      mc mb --ignore-existing local/stage-vendly &&
      mc anonymous set download local/prod-vendly &&
      mc anonymous set download local/stage-vendly &&
      echo 'Buckets prod-vendly + stage-vendly ready (anonymous download enabled).';
      "
    restart: "no"

networks:
  vendly-net:
    external: true

volumes:
  minio-data:
