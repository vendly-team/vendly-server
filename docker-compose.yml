services:
  vendly-prod:
    image: ${VENDLY_PROD_IMAGE}
    container_name: vendly-prod
    restart: unless-stopped
    ports:
      - "150:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vendly-net
    depends_on:
      seq:
        condition: service_started
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  vendly-stage:
    image: ${VENDLY_STAGE_IMAGE}
    container_name: vendly-stage
    restart: unless-stopped
    ports:
      - "151:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vendly-net
    depends_on:
      seq:
        condition: service_started
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  seq:
    image: datalust/seq:latest
    container_name: vendly-seq-prod
    restart: unless-stopped
    ports:
      - "5341:5341"
      - "8082:80"
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=Vendly@Seq2026!
    volumes:
      - seq-prod-data:/data
    networks:
      - vendly-net

  minio:
    image: quay.io/minio/minio:latest
    container_name: vendly-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_SERVER_URL=https://files.vestor.uz
      - MINIO_BROWSER_REDIRECT_URL=https://files.vestor.uz/console
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - vendly-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  createbuckets:
    image: minio/mc:latest
    container_name: vendly-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - vendly-net
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/prod-vendly &&
      mc mb --ignore-existing local/stage-vendly &&
      mc anonymous set download local/prod-vendly &&
      mc anonymous set download local/stage-vendly &&
      echo 'Buckets prod-vendly + stage-vendly ready (anonymous download enabled).';
      "
    restart: "no"

networks:
  vendly-net:
    driver: bridge

volumes:
  seq-prod-data:
  minio-data:
