services:
  vendly:
    image: ${VENDLY_IMAGE}
    container_name: vendly-prod
    restart: unless-stopped
    ports:
      - "150:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vendly-net
    depends_on:
      - seq

  seq:
    image: datalust/seq:latest
    container_name: vendly-seq-prod
    restart: unless-stopped
    ports:
      - "5341:5341"
      - "8082:80"
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=Vendly@Seq2026!
    volumes:
      - seq-prod-data:/data
    networks:
      - vendly-net

networks:
  vendly-net:
    driver: bridge

volumes:
  seq-prod-data: